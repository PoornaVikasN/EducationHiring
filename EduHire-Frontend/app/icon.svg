<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background, rounded like a modern app icon -->
  <rect width="32" height="32" rx="8" fill="#0d1b2a"/>

  <!-- Subtle green glow at centre-bottom (brand gradient hint) -->
  <radialGradient id="glow" cx="50%" cy="80%" r="55%">
    <stop offset="0%" stop-color="#0a6e4f" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
  </radialGradient>
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>

  <!-- "Rx" logotype — bold, centred -->
  <text
    x="16"
    y="22"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="16"
    fill="#4ade80"
    text-anchor="middle"
    letter-spacing="-0.5"
  >Rx</text>

  <!-- Red live-indicator dot (mirrors the pulse in site-header) -->
  <circle cx="25.5" cy="6.5" r="3.5" fill="#ef4444"/>
  <circle cx="25.5" cy="6.5" r="2" fill="#fca5a5"/>
</svg>
